<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tracking</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="main-header">
  <img src="logo.png" class="logo-small">
  <h2>TRACKING</h2>
</header>

<div class="container card">
<table>
<thead>
<tr><th>Date</th><th>Name</th><th>ID</th><th>HIV</th></tr>
</thead>
<tbody id="body"></tbody>
</table>

<button onclick="back()">⬅ Back</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, onSnapshot }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({ apiKey:"AIza...", authDomain:"...", projectId:"..."});
const db = getFirestore(app);

onSnapshot(collection(db,"tti_records"), snap=>{
 body.innerHTML="";
 snap.forEach(d=>{
  body.innerHTML+=`<tr>
  <td>${d.data().date}</td>
  <td>${d.data().donorName}</td>
  <td>${d.data().donorId}</td>
  <td>${d.data().hiv}</td>
  </tr>`;
 });
});

window.back=()=>location.href="index.html";
</script>

</body>
</html>
