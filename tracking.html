<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TTI Monitoring - Tracking</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="top-header">
    <div class="top-header-inner centered-header">
      <img src="logo.png" alt="PRC Logo" class="header-logo" />
      <div class="header-text">
        <h1>PHILIPPINE RED CROSS BAGUIO CITY CHAPTER</h1>
        <h2>TTI MONITORING</h2>
      </div>
    </div>
  </header>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <img src="logo.png" alt="PRC Logo" class="sidebar-logo" />
        <div>
          <div class="brand-title">TTI System</div>
          <div class="brand-subtitle">Hospital Dashboard</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="data-input.html" class="nav-link">Data Input</a>
        <a href="hubing-results.html" class="nav-link">Hubbing Data</a>
        <a href="tracking.html" class="nav-link active">Tracking</a>
        <a href="statistics.html" class="nav-link">Statistics</a>
      </nav>

      <div class="sidebar-user-box">
        <div><strong>User:</strong> <span id="sidebarEmail">-</span></div>
        <div><strong>Role:</strong> <span id="sidebarRole">-</span></div>
      </div>

      <button id="logoutBtn" class="logout-btn">Logout</button>
    </aside>

    <main class="main-content">
      <section class="page-banner">
        <div>
          <h3>Tracking</h3>
          <p>Collapsed donor list with expandable details</p>
        </div>
      </section>

      <section class="content-card">
        <div class="card-title-row">
          <h4>Search Filter</h4>
        </div>

        <div class="tracking-filter-grid">
          <input type="text" id="searchInput" placeholder="Search donor name, serial number, blood type, address, contact, occupation, status..." />
          <select id="statusFilter">
            <option value="">All Overall Status</option>
            <option value="🔴 Reactive">Reactive</option>
            <option value="🟠 Initially Reactive">Initially Reactive</option>
            <option value="🟢 Non-Reactive">Non-Reactive</option>
          </select>
        </div>

        <div class="tracking-filter-grid">
          <input type="date" id="collectionDateFilter" />
          <button type="button" id="clearFilterBtn" class="secondary-btn">Clear Filters</button>
        </div>
      </section>

      <section class="content-card compact-card">
        <div class="tracking-count-row">
          <div><strong>Total Records Shown:</strong> <span id="recordCount">0</span></div>
        </div>
      </section>

      <div id="recordsContainer"></div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      collection,
      onSnapshot,
      deleteDoc,
      doc,
      getDoc,
      updateDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCuDknEG8pjbT0_yaEDZ77IFYdGYrtwCIE",
      authDomain: "red-cross-baguio-tti-monitor.firebaseapp.com",
      projectId: "red-cross-baguio-tti-monitor",
      storageBucket: "red-cross-baguio-tti-monitor.firebasestorage.app",
      messagingSenderId: "361015244463",
      appId: "1:361015244463:web:076f8802942ca904f5065a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentRole = "";
    let allRecords = [];

    const sidebarEmail = document.getElementById("sidebarEmail");
    const sidebarRole = document.getElementById("sidebarRole");
    const logoutBtn = document.getElementById("logoutBtn");
    const searchInput = document.getElementById("searchInput");
    const statusFilter = document.getElementById("statusFilter");
    const collectionDateFilter = document.getElementById("collectionDateFilter");
    const clearFilterBtn = document.getElementById("clearFilterBtn");
    const recordsContainer = document.getElementById("recordsContainer");
    const recordCount = document.getElementById("recordCount");

    function safe(val) {
      return val === undefined || val === null ? "" : String(val);
    }

    function getPatientInfo(record) {
      return record.patientInfo || {};
    }

    function getScreening(record) {
      return record.screening || {};
    }

    function getReferralStatus(record) {
      return safe(record.referralStatus) || "No";
    }

    function fullName(record) {
      const p = getPatientInfo(record);
      return [
        safe(p.surname),
        safe(p.firstName),
        safe(p.middleName),
        safe(p.suffix)
      ].filter(Boolean).join(" ");
    }

    function getOverallStatus(record) {
      const s = getScreening(record);
      return safe(s.overallStatus);
    }

    function overallClass(overall) {
      if (overall === "🔴 Reactive") return "overall-reactive";
      if (overall === "🟠 Initially Reactive") return "overall-initially-reactive";
      if (overall === "🟢 Non-Reactive") return "overall-nonreactive";
      return "overall-neutral";
    }

    function interpretationBadge(text) {
      let cls = "table-badge-neutral";
      if (text === "🔴 Reactive") cls = "table-badge-reactive";
      if (text === "🟠 Initially Reactive") cls = "table-badge-initially-reactive";
      if (text === "🟢 Non-Reactive") cls = "table-badge-nonreactive";
      return `<span class="table-result-badge ${cls}">${text || "--"}</span>`;
    }

    function referralClass(value) {
      return value === "Yes" ? "referral-yes" : "referral-no";
    }

    function searchBlob(record) {
      const p = getPatientInfo(record);
      const s = getScreening(record);
      return [
        safe(p.surname),
        safe(p.firstName),
        safe(p.middleName),
        safe(p.suffix),
        safe(p.serialNumber),
        safe(p.bloodType),
        safe(p.address),
        safe(p.contactInfo),
        safe(p.occupation),
        safe(p.collectionDate),
        safe(s.overallStatus),
        safe(record.referralStatus),
        safe(record.createdBy)
      ].join(" ").toLowerCase();
    }

    function renderPatientInfo(record) {
      const p = getPatientInfo(record);
      return `
        <div class="screening-box">
          <div class="screening-box-title">Patient Information</div>
          <div class="tracking-info-grid">
            <div class="tracking-info-item"><span class="label">Surname</span><span class="value">${safe(p.surname) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">First Name</span><span class="value">${safe(p.firstName) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">Middle Name</span><span class="value">${safe(p.middleName) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">Suffix</span><span class="value">${safe(p.suffix) || "--"}</span></div>

            <div class="tracking-info-item"><span class="label">Serial Number</span><span class="value">${safe(p.serialNumber) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">Blood Type</span><span class="value">${safe(p.bloodType) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">Civil Status</span><span class="value">${safe(p.civilStatus) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">Birthday</span><span class="value">${safe(p.birthday) || "--"}</span></div>

            <div class="tracking-info-item"><span class="label">Age</span><span class="value">${safe(p.age) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">Sex</span><span class="value">${safe(p.sex) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">Contact Info</span><span class="value">${safe(p.contactInfo) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">Address</span><span class="value">${safe(p.address) || "--"}</span></div>

            <div class="tracking-info-item"><span class="label">Occupation</span><span class="value">${safe(p.occupation) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">Collection Date</span><span class="value">${safe(p.collectionDate) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">Donor Type</span><span class="value">${safe(p.donorType) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">Donation Frequency</span><span class="value">${safe(p.donationFrequency) || "--"}</span></div>

            <div class="tracking-info-item"><span class="label">Repeat Date</span><span class="value">${safe(p.repeatDate) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">Encoded By</span><span class="value">${safe(record.createdBy) || "--"}</span></div>
          </div>
        </div>
      `;
    }

    function renderScreeningTable(record) {
      const s = getScreening(record);
      const rows = [
        ["HIV", s.hiv || {}],
        ["HBsAg", s.hbsag || {}],
        ["HCV", s.hcv || {}],
        ["Syphilis", s.syphilis || {}],
        ["Malaria", s.malaria || {}]
      ];

      return `
        <div class="screening-box">
          <div class="screening-box-title">TTI Screening Results</div>
          <div class="table-wrap">
            <table class="records-table tracking-results-table">
              <thead>
                <tr>
                  <th>Test</th>
                  <th>OD</th>
                  <th>Repeat 1</th>
                  <th>Repeat 2</th>
                  <th>Lot Number</th>
                  <th>Expiration Date</th>
                  <th>Date Tested</th>
                  <th>Interpretation</th>
                </tr>
              </thead>
              <tbody>
                ${rows.map(([label, d]) => `
                  <tr>
                    <td>${label}</td>
                    <td>${safe(d.od) || "--"}</td>
                    <td>${safe(d.repeat1) || "--"}</td>
                    <td>${safe(d.repeat2) || "--"}</td>
                    <td>${safe(d.lotNumber) || "--"}</td>
                    <td>${safe(d.expirationDate) || "--"}</td>
                    <td>${safe(d.dateTested) || "--"}</td>
                    <td>${interpretationBadge(safe(d.interpretation))}</td>
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderRecords() {
      const searchTerm = searchInput.value.trim().toLowerCase();
      const statusValue = statusFilter.value;
      const dateValue = collectionDateFilter.value;

      const filtered = allRecords.filter((record) => {
        const p = getPatientInfo(record);
        const overall = getOverallStatus(record);

        const matchSearch = !searchTerm || searchBlob(record).includes(searchTerm);
        const matchStatus = !statusValue || overall === statusValue;
        const matchDate = !dateValue || safe(p.collectionDate) === dateValue;

        return matchSearch && matchStatus && matchDate;
      });

      recordCount.textContent = filtered.length;
      recordsContainer.innerHTML = "";

      if (!filtered.length) {
        recordsContainer.innerHTML = `
          <section class="content-card">
            <div class="empty-state">No records found.</div>
          </section>
        `;
        return;
      }

      filtered.forEach((record) => {
        const p = getPatientInfo(record);
        const donorName = fullName(record) || "Unnamed Record";
        const serial = safe(p.serialNumber) || "--";
        const overall = getOverallStatus(record) || "--";
        const referral = getReferralStatus(record);

        const section = document.createElement("section");
        section.className = "content-card tracking-list-card";

        section.innerHTML = `
          <div class="tracking-list-header">
            <div class="tracking-list-left clickable-header" data-toggle="${record.id}">
              <button class="collapse-toggle" type="button" data-toggle="${record.id}">+</button>
              <div class="tracking-name-block">
                <div class="tracking-name">${donorName}</div>
                <div class="tracking-subline">Serial No: ${serial}</div>
              </div>
            </div>

            <div class="tracking-list-right">
              <span class="tracking-overall-badge ${overallClass(overall)}">${overall}</span>
              <button type="button" class="referral-btn" data-id="${record.id}">Referral</button>
              <span class="referral-status-badge ${referralClass(referral)}">${referral}</span>
              ${
                currentRole === "master"
                  ? `<button class="secondary-btn editRecordBtn" data-id="${record.id}">Edit</button>
                     <button class="table-action-btn deleteRecordBtn" data-id="${record.id}">Delete</button>`
                  : ""
              }
            </div>
          </div>

          <div class="tracking-collapsed-body hidden" id="details-${record.id}">
            ${renderPatientInfo(record)}
            ${renderScreeningTable(record)}
          </div>
        `;

        recordsContainer.appendChild(section);
      });
    }

    async function setReferralStatus(id, value) {
      await updateDoc(doc(db, "tti_records", id), {
        referralStatus: value
      });
    }

    document.addEventListener("click", async (e) => {
      const toggleId = e.target.getAttribute("data-toggle");
      if (toggleId) {
        const details = document.getElementById(`details-${toggleId}`);
        const btn = document.querySelector(`.collapse-toggle[data-toggle="${toggleId}"]`);
        if (details) {
          const hidden = details.classList.contains("hidden");
          details.classList.toggle("hidden");
          if (btn) btn.textContent = hidden ? "−" : "+";
        }
        return;
      }

      if (e.target.classList.contains("editRecordBtn")) {
        const id = e.target.getAttribute("data-id");
        window.location.href = `data-input.html?edit=${id}`;
        return;
      }

      if (e.target.classList.contains("deleteRecordBtn")) {
        const id = e.target.getAttribute("data-id");
        if (currentRole !== "master") {
          alert("No permission.");
          return;
        }
        if (!confirm("Delete this record?")) return;
        try {
          await deleteDoc(doc(db, "tti_records", id));
        } catch (error) {
          alert(error.message);
        }
        return;
      }

      if (e.target.classList.contains("referral-btn")) {
        const id = e.target.getAttribute("data-id");
        const answer = prompt("Set referral status: Yes or No", "No");
        if (!answer) return;
        const v = answer.trim().toLowerCase();
        if (v === "yes") await setReferralStatus(id, "Yes");
        else if (v === "no") await setReferralStatus(id, "No");
        else alert("Please enter Yes or No.");
      }
    });

    clearFilterBtn.addEventListener("click", () => {
      searchInput.value = "";
      statusFilter.value = "";
      collectionDateFilter.value = "";
      renderRecords();
    });
  </script>
</body>
</html>
