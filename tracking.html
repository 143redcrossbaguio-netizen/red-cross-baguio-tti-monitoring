  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      collection,
      onSnapshot,
      deleteDoc,
      updateDoc,
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCuDknEG8pjbT0_yaEDZ77IFYdGYrtwCIE",
      authDomain: "red-cross-baguio-tti-monitor.firebaseapp.com",
      projectId: "red-cross-baguio-tti-monitor",
      storageBucket: "red-cross-baguio-tti-monitor.firebasestorage.app",
      messagingSenderId: "361015244463",
      appId: "1:361015244463:web:076f8802942ca904f5065a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentRole = "";
    let allRecords = [];
    let filteredRecordsCache = [];

    const sidebarEmail = document.getElementById("sidebarEmail");
    const sidebarRole = document.getElementById("sidebarRole");
    const logoutBtn = document.getElementById("logoutBtn");
    const searchInput = document.getElementById("searchInput");
    const statusFilter = document.getElementById("statusFilter");
    const collectionDateFilter = document.getElementById("collectionDateFilter");
    const monthFilter = document.getElementById("monthFilter");
    const testFilter = document.getElementById("testFilter");
    const clearFilterBtn = document.getElementById("clearFilterBtn");
    const printFilteredBtn = document.getElementById("printFilteredBtn");
    const exportFilteredCsvBtn = document.getElementById("exportFilteredCsvBtn");
    const recordsContainer = document.getElementById("recordsContainer");
    const recordCount = document.getElementById("recordCount");

    function safe(val) {
      return val === undefined || val === null ? "" : String(val);
    }

    function getPatientInfo(record) {
      return record.patientInfo || {};
    }

    function getScreening(record) {
      return record.screening || {};
    }

    function getOverallStatus(record) {
      return safe(getScreening(record).overallStatus);
    }

    function getReferralStatus(record) {
      return safe(record.referralStatus) || "No";
    }

    function getConfirmatoryStatus(record) {
      return safe(record.confirmatoryStatus) || "";
    }

    function fullName(record) {
      const p = getPatientInfo(record);
      return [safe(p.surname), safe(p.firstName), safe(p.middleName), safe(p.suffix)]
        .filter(Boolean)
        .join(" ");
    }

    function overallClass(value) {
      if (value === "🔴 Reactive") return "overall-reactive";
      if (value === "🟠 Initially Reactive") return "overall-initially-reactive";
      if (value === "🟢 Non-Reactive") return "overall-nonreactive";
      return "overall-neutral";
    }

    function interpretationBadge(text) {
      let cls = "table-badge-neutral";
      if (text === "🔴 Reactive") cls = "table-badge-reactive";
      if (text === "🟠 Initially Reactive") cls = "table-badge-initially-reactive";
      if (text === "🟢 Non-Reactive") cls = "table-badge-nonreactive";
      return `<span class="table-result-badge ${cls}">${text || "--"}</span>`;
    }

    function searchBlob(record) {
      const p = getPatientInfo(record);
      const s = getScreening(record);
      return [
        safe(p.surname),
        safe(p.firstName),
        safe(p.middleName),
        safe(p.suffix),
        safe(p.serialNumber),
        safe(p.bloodType),
        safe(p.address),
        safe(p.contactInfo),
        safe(p.occupation),
        safe(p.collectionDate),
        safe(s.overallStatus),
        safe(record.referralStatus),
        safe(record.confirmatoryStatus),
        safe(record.createdBy),
        safe(s.hiv?.interpretation),
        safe(s.hbsag?.interpretation),
        safe(s.hcv?.interpretation),
        safe(s.syphilis?.interpretation),
        safe(s.malaria?.interpretation)
      ].join(" ").toLowerCase();
    }

    function getRecordMonth(record) {
      const p = getPatientInfo(record);
      const date = safe(p.collectionDate);
      if (!date || !date.includes("-")) return "";
      return date.split("-")[1] || "";
    }

    function recordMatchesTest(record, selectedTest) {
      if (!selectedTest) return true;
      const s = getScreening(record);

      if (selectedTest === "HIV") return !!s.hiv;
      if (selectedTest === "HBsAg") return !!s.hbsag;
      if (selectedTest === "HCV") return !!s.hcv;
      if (selectedTest === "Syphilis") return !!s.syphilis;
      if (selectedTest === "Malaria") return !!s.malaria;

      return true;
    }

    function renderPatientInfo(record) {
      const p = getPatientInfo(record);
      return `
        <div class="screening-box">
          <div class="screening-box-title">Patient Information</div>
          <div class="tracking-info-grid">
            <div class="tracking-info-item"><span class="label">Surname</span><span class="value">${safe(p.surname) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">First Name</span><span class="value">${safe(p.firstName) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">Middle Name</span><span class="value">${safe(p.middleName) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">Suffix</span><span class="value">${safe(p.suffix) || "--"}</span></div>

            <div class="tracking-info-item"><span class="label">Serial Number</span><span class="value">${safe(p.serialNumber) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">Blood Type</span><span class="value">${safe(p.bloodType) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">Civil Status</span><span class="value">${safe(p.civilStatus) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">Birthday</span><span class="value">${safe(p.birthday) || "--"}</span></div>

            <div class="tracking-info-item"><span class="label">Age</span><span class="value">${safe(p.age) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">Sex</span><span class="value">${safe(p.sex) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">Contact Info</span><span class="value">${safe(p.contactInfo) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">Address</span><span class="value">${safe(p.address) || "--"}</span></div>

            <div class="tracking-info-item"><span class="label">Occupation</span><span class="value">${safe(p.occupation) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">Collection Date</span><span class="value">${safe(p.collectionDate) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">Donor Type</span><span class="value">${safe(p.donorType) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">Donation Frequency</span><span class="value">${safe(p.donationFrequency) || "--"}</span></div>

            <div class="tracking-info-item"><span class="label">Repeat Date</span><span class="value">${safe(p.repeatDate) || "--"}</span></div>
            <div class="tracking-info-item"><span class="label">Encoded By</span><span class="value">${safe(record.createdBy) || "--"}</span></div>
          </div>
        </div>
      `;
    }

    function renderScreeningTable(record) {
      const s = getScreening(record);
      const referral = getReferralStatus(record);
      const confirmatory = getConfirmatoryStatus(record);

      const confirmatoryOptions = [
        "",
        "Pending",
        "Sent",
        "Done",
        "Positive",
        "Negative"
      ];

      const rows = [
        ["HIV", s.hiv || {}],
        ["HBsAg", s.hbsag || {}],
        ["HCV", s.hcv || {}],
        ["Syphilis", s.syphilis || {}],
        ["Malaria", s.malaria || {}]
      ];

      return `
        <div class="screening-box">
          <div class="screening-box-title">TTI Screening Results</div>
          <div class="table-wrap">
            <table class="records-table tracking-results-table">
              <thead>
                <tr>
                  <th>Test</th>
                  <th>OD</th>
                  <th>Repeat 1</th>
                  <th>Repeat 2</th>
                  <th>Lot Number</th>
                  <th>Expiration Date</th>
                  <th>Date Tested</th>
                  <th>Interpretation</th>
                  <th>Referral</th>
                  <th>Confirmatory</th>
                </tr>
              </thead>
              <tbody>
                ${rows.map(([label, d], index) => `
                  <tr>
                    <td>${label}</td>
                    <td>${safe(d.od) || "--"}</td>
                    <td>${safe(d.repeat1) || "--"}</td>
                    <td>${safe(d.repeat2) || "--"}</td>
                    <td>${safe(d.lotNumber) || "--"}</td>
                    <td>${safe(d.expirationDate) || "--"}</td>
                    <td>${safe(d.dateTested) || "--"}</td>
                    <td>${interpretationBadge(safe(d.interpretation))}</td>
                    ${
                      index === 0
                        ? `
                          <td rowspan="5" class="merge-cell">
                            <select class="inline-select referral-select stop-collapse" data-id="${record.id}">
                              <option value="No" ${referral === "No" ? "selected" : ""}>No</option>
                              <option value="Yes" ${referral === "Yes" ? "selected" : ""}>Yes</option>
                            </select>
                          </td>
                          <td rowspan="5" class="merge-cell">
                            ${
                              referral === "Yes"
                                ? `
                                  <select class="inline-select confirmatory-select stop-collapse" data-id="${record.id}">
                                    ${confirmatoryOptions.map(opt => `
                                      <option value="${opt}" ${confirmatory === opt ? "selected" : ""}>
                                        ${opt || "Select"}
                                      </option>
                                    `).join("")}
                                  </select>
                                `
                                : `<span class="muted-text">--</span>`
                            }
                          </td>
                        `
                        : ""
                    }
                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function sortRecords(records) {
      return records.sort((a, b) => {
        const aSec = a.createdAt?.seconds || 0;
        const bSec = b.createdAt?.seconds || 0;
        return bSec - aSec;
      });
    }

    function csvEscape(value) {
      const str = safe(value);
      return `"${str.replace(/"/g, '""')}"`;
    }

    function createDonorCSV(record) {
      const p = getPatientInfo(record);
      const s = getScreening(record);

      const lines = [];
      lines.push(["Field", "Value"]);
      lines.push(["Surname", safe(p.surname)]);
      lines.push(["First Name", safe(p.firstName)]);
      lines.push(["Middle Name", safe(p.middleName)]);
      lines.push(["Suffix", safe(p.suffix)]);
      lines.push(["Serial Number", safe(p.serialNumber)]);
      lines.push(["Blood Type", safe(p.bloodType)]);
      lines.push(["Civil Status", safe(p.civilStatus)]);
      lines.push(["Birthday", safe(p.birthday)]);
      lines.push(["Age", safe(p.age)]);
      lines.push(["Sex", safe(p.sex)]);
      lines.push(["Contact Info", safe(p.contactInfo)]);
      lines.push(["Address", safe(p.address)]);
      lines.push(["Occupation", safe(p.occupation)]);
      lines.push(["Collection Date", safe(p.collectionDate)]);
      lines.push(["Donor Type", safe(p.donorType)]);
      lines.push(["Donation Frequency", safe(p.donationFrequency)]);
      lines.push(["Repeat Date", safe(p.repeatDate)]);
      lines.push(["Overall Status", safe(s.overallStatus)]);
      lines.push(["Referral Status", getReferralStatus(record)]);
      lines.push(["Confirmatory", getConfirmatoryStatus(record)]);
      lines.push(["Encoded By", safe(record.createdBy)]);
      lines.push([]);
      lines.push(["Test", "OD", "Repeat 1", "Repeat 2", "Lot Number", "Expiration Date", "Date Tested", "Interpretation"]);

      const tests = [
        ["HIV", s.hiv || {}],
        ["HBsAg", s.hbsag || {}],
        ["HCV", s.hcv || {}],
        ["Syphilis", s.syphilis || {}],
        ["Malaria", s.malaria || {}]
      ];

      tests.forEach(([label, d]) => {
        lines.push([
          label,
          safe(d.od),
          safe(d.repeat1),
          safe(d.repeat2),
          safe(d.lotNumber),
          safe(d.expirationDate),
          safe(d.dateTested),
          safe(d.interpretation)
        ]);
      });

      return lines.map(row => row.map(csvEscape).join(",")).join("\n");
    }

    function downloadCSV(record) {
      const p = getPatientInfo(record);
      const serial = safe(p.serialNumber) || "record";
      const donor = (fullName(record) || "donor").replace(/[^\w\- ]+/g, "").trim().replace(/\s+/g, "_");
      const filename = `${serial}_${donor}_tracking.csv`;

      const csv = createDonorCSV(record);
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function createFilteredCSV(records) {
      const lines = [];
      lines.push([
        "Serial Number",
        "Surname",
        "First Name",
        "Middle Name",
        "Suffix",
        "Blood Type",
        "Civil Status",
        "Birthday",
        "Age",
        "Sex",
        "Contact Info",
        "Address",
        "Occupation",
        "Collection Date",
        "Donor Type",
        "Donation Frequency",
        "Repeat Date",
        "Overall Status",
        "Referral Status",
        "Confirmatory",
        "Encoded By",
        "HIV",
        "HBsAg",
        "HCV",
        "Syphilis",
        "Malaria"
      ]);

      records.forEach((record) => {
        const p = getPatientInfo(record);
        const s = getScreening(record);

        lines.push([
          safe(p.serialNumber),
          safe(p.surname),
          safe(p.firstName),
          safe(p.middleName),
          safe(p.suffix),
          safe(p.bloodType),
          safe(p.civilStatus),
          safe(p.birthday),
          safe(p.age),
          safe(p.sex),
          safe(p.contactInfo),
          safe(p.address),
          safe(p.occupation),
          safe(p.collectionDate),
          safe(p.donorType),
          safe(p.donationFrequency),
          safe(p.repeatDate),
          safe(s.overallStatus),
          getReferralStatus(record),
          getConfirmatoryStatus(record),
          safe(record.createdBy),
          safe(s.hiv?.interpretation),
          safe(s.hbsag?.interpretation),
          safe(s.hcv?.interpretation),
          safe(s.syphilis?.interpretation),
          safe(s.malaria?.interpretation)
        ]);
      });

      return lines.map(row => row.map(csvEscape).join(",")).join("\n");
    }

    function exportFilteredCSV(records) {
      const csv = createFilteredCSV(records);
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "tti_tracking_filtered_records.csv";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function printDonor(record) {
      const p = getPatientInfo(record);
      const s = getScreening(record);
      const donorName = fullName(record) || "Unnamed Record";

      const tests = [
        ["HIV", s.hiv || {}],
        ["HBsAg", s.hbsag || {}],
        ["HCV", s.hcv || {}],
        ["Syphilis", s.syphilis || {}],
        ["Malaria", s.malaria || {}]
      ];

      const testRows = tests.map(([label, d]) => `
        <tr>
          <td>${label}</td>
          <td>${safe(d.od) || "--"}</td>
          <td>${safe(d.repeat1) || "--"}</td>
          <td>${safe(d.repeat2) || "--"}</td>
          <td>${safe(d.lotNumber) || "--"}</td>
          <td>${safe(d.expirationDate) || "--"}</td>
          <td>${safe(d.dateTested) || "--"}</td>
          <td>${safe(d.interpretation) || "--"}</td>
        </tr>
      `).join("");

      const html = `
        <html>
          <head>
            <title>Print Donor Record</title>
            <style>
              body { font-family: Arial, sans-serif; padding: 24px; color: #111; }
              h1, h2, h3 { margin: 0 0 10px; }
              .header { text-align: center; margin-bottom: 20px; }
              .section { margin-top: 24px; }
              .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
              .item { border: 1px solid #ccc; padding: 8px 10px; border-radius: 6px; }
              .label { font-size: 12px; color: #555; display: block; margin-bottom: 4px; }
              table { width: 100%; border-collapse: collapse; margin-top: 10px; }
              th, td { border: 1px solid #999; padding: 8px; font-size: 12px; text-align: center; }
              th { background: #eee; }
            </style>
          </head>
          <body>
            <div class="header">
              <h2>PHILIPPINE RED CROSS BAGUIO CITY CHAPTER</h2>
              <h3>TTI MONITORING</h3>
              <h1>Donor Record</h1>
            </div>

            <div class="section">
              <h3>${donorName}</h3>
              <div class="grid">
                <div class="item"><span class="label">Serial Number</span>${safe(p.serialNumber) || "--"}</div>
                <div class="item"><span class="label">Blood Type</span>${safe(p.bloodType) || "--"}</div>
                <div class="item"><span class="label">Civil Status</span>${safe(p.civilStatus) || "--"}</div>
                <div class="item"><span class="label">Birthday</span>${safe(p.birthday) || "--"}</div>
                <div class="item"><span class="label">Age</span>${safe(p.age) || "--"}</div>
                <div class="item"><span class="label">Sex</span>${safe(p.sex) || "--"}</div>
                <div class="item"><span class="label">Contact Info</span>${safe(p.contactInfo) || "--"}</div>
                <div class="item"><span class="label">Address</span>${safe(p.address) || "--"}</div>
                <div class="item"><span class="label">Occupation</span>${safe(p.occupation) || "--"}</div>
                <div class="item"><span class="label">Collection Date</span>${safe(p.collectionDate) || "--"}</div>
                <div class="item"><span class="label">Donor Type</span>${safe(p.donorType) || "--"}</div>
                <div class="item"><span class="label">Donation Frequency</span>${safe(p.donationFrequency) || "--"}</div>
                <div class="item"><span class="label">Repeat Date</span>${safe(p.repeatDate) || "--"}</div>
                <div class="item"><span class="label">Overall Status</span>${safe(s.overallStatus) || "--"}</div>
                <div class="item"><span class="label">Referral Status</span>${getReferralStatus(record)}</div>
                <div class="item"><span class="label">Confirmatory</span>${getConfirmatoryStatus(record) || "--"}</div>
                <div class="item"><span class="label">Encoded By</span>${safe(record.createdBy) || "--"}</div>
              </div>
            </div>

            <div class="section">
              <h3>TTI Screening Results</h3>
              <table>
                <thead>
                  <tr>
                    <th>Test</th>
                    <th>OD</th>
                    <th>Repeat 1</th>
                    <th>Repeat 2</th>
                    <th>Lot Number</th>
                    <th>Expiration Date</th>
                    <th>Date Tested</th>
                    <th>Interpretation</th>
                  </tr>
                </thead>
                <tbody>
                  ${testRows}
                </tbody>
              </table>
            </div>
          </body>
        </html>
      `;

      const printWindow = window.open("", "_blank", "width=1000,height=800");
      printWindow.document.open();
      printWindow.document.write(html);
      printWindow.document.close();
      printWindow.focus();
      printWindow.print();
    }

    function printFilteredRecords(records) {
      const rows = records.map((record) => {
        const p = getPatientInfo(record);
        const s = getScreening(record);
        return `
          <tr>
            <td>${safe(p.serialNumber) || "--"}</td>
            <td>${fullName(record) || "--"}</td>
            <td>${safe(p.bloodType) || "--"}</td>
            <td>${safe(p.collectionDate) || "--"}</td>
            <td>${safe(s.overallStatus) || "--"}</td>
            <td>${safe(s.hiv?.interpretation) || "--"}</td>
            <td>${safe(s.hbsag?.interpretation) || "--"}</td>
            <td>${safe(s.hcv?.interpretation) || "--"}</td>
            <td>${safe(s.syphilis?.interpretation) || "--"}</td>
            <td>${safe(s.malaria?.interpretation) || "--"}</td>
          </tr>
        `;
      }).join("");

      const html = `
        <html>
          <head>
            <title>Print Filtered Records</title>
            <style>
              body { font-family: Arial, sans-serif; padding: 24px; color: #111; }
              h1, h2, h3 { margin: 0 0 10px; text-align: center; }
              table { width: 100%; border-collapse: collapse; margin-top: 20px; }
              th, td { border: 1px solid #999; padding: 8px; font-size: 12px; text-align: center; }
              th { background: #eee; }
            </style>
          </head>
          <body>
            <h2>PHILIPPINE RED CROSS BAGUIO CITY CHAPTER</h2>
            <h3>TTI MONITORING</h3>
            <h1>Filtered Tracking Records</h1>
            <table>
              <thead>
                <tr>
                  <th>Serial Number</th>
                  <th>Name</th>
                  <th>Blood Type</th>
                  <th>Collection Date</th>
                  <th>Overall Status</th>
                  <th>HIV</th>
                  <th>HBsAg</th>
                  <th>HCV</th>
                  <th>Syphilis</th>
                  <th>Malaria</th>
                </tr>
              </thead>
              <tbody>
                ${rows || `<tr><td colspan="10">No records found.</td></tr>`}
              </tbody>
            </table>
          </body>
        </html>
      `;

      const printWindow = window.open("", "_blank", "width=1200,height=800");
      printWindow.document.open();
      printWindow.document.write(html);
      printWindow.document.close();
      printWindow.focus();
      printWindow.print();
    }

    function getFilteredRecords() {
      const searchTerm = searchInput.value.trim().toLowerCase();
      const statusValue = statusFilter.value;
      const dateValue = collectionDateFilter.value;
      const monthValue = monthFilter.value;
      const testValue = testFilter.value;

      return allRecords.filter((record) => {
        const p = getPatientInfo(record);
        const overall = getOverallStatus(record);

        const matchSearch = !searchTerm || searchBlob(record).includes(searchTerm);
        const matchStatus = !statusValue || overall === statusValue;
        const matchDate = !dateValue || safe(p.collectionDate) === dateValue;
        const matchMonth = !monthValue || getRecordMonth(record) === monthValue;
        const matchTest = recordMatchesTest(record, testValue);

        return matchSearch && matchStatus && matchDate && matchMonth && matchTest;
      });
    }

    function renderRecords() {
      const filtered = getFilteredRecords();
      filteredRecordsCache = filtered;

      recordCount.textContent = filtered.length;
      recordsContainer.innerHTML = "";

      if (!filtered.length) {
        recordsContainer.innerHTML = `
          <section class="content-card">
            <div class="empty-state">No records found.</div>
          </section>
        `;
        return;
      }

      filtered.forEach((record) => {
        const p = getPatientInfo(record);
        const donorName = fullName(record) || "Unnamed Record";
        const serial = safe(p.serialNumber) || "--";
        const overall = getOverallStatus(record) || "--";

        const section = document.createElement("section");
        section.className = "content-card tracking-list-card";

        section.innerHTML = `
          <div class="tracking-list-header">
            <div class="tracking-list-left clickable-header" data-toggle="${record.id}">
              <button class="collapse-toggle" type="button" data-toggle="${record.id}">+</button>
              <div class="tracking-name-block">
                <div class="tracking-name">${donorName}</div>
                <div class="tracking-subline">Serial No: ${serial}</div>
              </div>
            </div>

            <div class="tracking-list-right">
              <span class="tracking-overall-badge ${overallClass(overall)}">${overall}</span>
              <button class="secondary-btn printRecordBtn no-toggle" data-id="${record.id}">Print</button>
              <button class="secondary-btn exportCsvBtn no-toggle" data-id="${record.id}">Export CSV</button>
              ${
                currentRole === "master"
                  ? `<button class="secondary-btn editRecordBtn no-toggle" data-id="${record.id}">Edit</button>
                     <button class="table-action-btn deleteRecordBtn no-toggle" data-id="${record.id}">Delete</button>`
                  : ""
              }
            </div>
          </div>

          <div class="tracking-collapsed-body hidden" id="details-${record.id}">
            ${renderPatientInfo(record)}
            ${renderScreeningTable(record)}
          </div>
        `;

        recordsContainer.appendChild(section);
      });
    }

    async function setReferralStatus(id, value) {
      const payload = { referralStatus: value };
      if (value === "No") payload.confirmatoryStatus = "";
      await updateDoc(doc(db, "tti_records", id), payload);
    }

    async function setConfirmatoryStatus(id, value) {
      await updateDoc(doc(db, "tti_records", id), {
        confirmatoryStatus: value
      });
    }

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }

      sidebarEmail.textContent = user.email;

      const userSnap = await getDoc(doc(db, "users", user.uid));
      if (userSnap.exists()) {
        currentRole = userSnap.data().role || "";
        sidebarRole.textContent = currentRole || "-";
      } else {
        currentRole = "";
        sidebarRole.textContent = "no role";
      }

      onSnapshot(collection(db, "tti_records"), (snapshot) => {
        allRecords = snapshot.docs.map((d) => ({
          id: d.id,
          ...d.data()
        }));
        sortRecords(allRecords);
        renderRecords();
      }, (error) => {
        console.error("Tracking snapshot error:", error);
        recordsContainer.innerHTML = `
          <section class="content-card">
            <div class="empty-state">Failed to load tracking data: ${error.message}</div>
          </section>
        `;
      });
    });

    logoutBtn.onclick = async () => {
      await signOut(auth);
      window.location.href = "index.html";
    };

    searchInput.addEventListener("input", renderRecords);
    statusFilter.addEventListener("change", renderRecords);
    collectionDateFilter.addEventListener("change", renderRecords);
    monthFilter.addEventListener("change", renderRecords);
    testFilter.addEventListener("change", renderRecords);

    clearFilterBtn.addEventListener("click", () => {
      searchInput.value = "";
      statusFilter.value = "";
      collectionDateFilter.value = "";
      monthFilter.value = "";
      testFilter.value = "";
      renderRecords();
    });

    printFilteredBtn.addEventListener("click", () => {
      printFilteredRecords(filteredRecordsCache);
    });

    exportFilteredCsvBtn.addEventListener("click", () => {
      exportFilteredCSV(filteredRecordsCache);
    });

    document.addEventListener("click", async (e) => {
      const toggleEl = e.target.closest("[data-toggle]");
      if (toggleEl && !e.target.closest(".no-toggle") && !e.target.closest(".stop-collapse")) {
        const toggleId = toggleEl.getAttribute("data-toggle");
        const details = document.getElementById(`details-${toggleId}`);
        const btn = document.querySelector(`.collapse-toggle[data-toggle="${toggleId}"]`);
        if (details) {
          const hidden = details.classList.contains("hidden");
          details.classList.toggle("hidden");
          if (btn) btn.textContent = hidden ? "−" : "+";
        }
        return;
      }

      if (e.target.classList.contains("printRecordBtn")) {
        const id = e.target.getAttribute("data-id");
        const record = allRecords.find(r => r.id === id);
        if (record) printDonor(record);
        return;
      }

      if (e.target.classList.contains("exportCsvBtn")) {
        const id = e.target.getAttribute("data-id");
        const record = allRecords.find(r => r.id === id);
        if (record) downloadCSV(record);
        return;
      }

      if (e.target.classList.contains("editRecordBtn")) {
        const id = e.target.getAttribute("data-id");
        window.location.href = `data-input.html?edit=${id}`;
        return;
      }

      if (e.target.classList.contains("deleteRecordBtn")) {
        const id = e.target.getAttribute("data-id");
        if (currentRole !== "master") {
          alert("No permission.");
          return;
        }
        if (!confirm("Delete this record?")) return;
        try {
          await deleteDoc(doc(db, "tti_records", id));
        } catch (error) {
          alert(error.message);
        }
        return;
      }
    });

    document.addEventListener("change", async (e) => {
      if (e.target.classList.contains("referral-select")) {
        const id = e.target.getAttribute("data-id");
        const value = e.target.value;
        try {
          await setReferralStatus(id, value);
        } catch (error) {
          alert(error.message);
        }
        return;
      }

      if (e.target.classList.contains("confirmatory-select")) {
        const id = e.target.getAttribute("data-id");
        const value = e.target.value;
        try {
          await setConfirmatoryStatus(id, value);
        } catch (error) {
          alert(error.message);
        }
      }
    });
  </script>
</body>
</html>
