<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TTI Monitoring - Hubbing Data</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="top-header">
    <div class="top-header-inner centered-header">
      <img src="logo.png" alt="PRC Logo" class="header-logo" />
      <div class="header-text">
        <h1>PHILIPPINE RED CROSS BAGUIO CITY CHAPTER</h1>
        <h2>TTI MONITORING</h2>
      </div>
    </div>
  </header>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <img src="logo.png" alt="PRC Logo" class="sidebar-logo" />
        <div>
          <div class="brand-title">TTI System</div>
          <div class="brand-subtitle">Hospital Dashboard</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="data-input.html" class="nav-link">Data Input</a>
        <a href="hubing-results.html" class="nav-link active">Hubbing Data</a>
        <a href="tracking.html" class="nav-link">Tracking</a>
        <a href="statistics.html" class="nav-link">Statistics</a>
      </nav>

      <div class="sidebar-user-box">
        <div><strong>User:</strong> <span id="sidebarEmail">-</span></div>
        <div><strong>Role:</strong> <span id="sidebarRole">-</span></div>
      </div>

      <button id="logoutBtn" class="logout-btn">Logout</button>
    </aside>

    <main class="main-content">
      <section class="page-banner">
        <div>
          <h3>Hubbing Data</h3>
          <p>Quick serial-based result entry</p>
        </div>
      </section>

      <section class="content-card">
        <div class="card-title-row">
          <h4>Hubbing Results Entry</h4>
        </div>

        <input type="text" id="serialNumber" placeholder="Serial Number" />

        <div class="cutoff-wrap">
          <label class="field-label">Cutoff Value</label>
          <input type="number" id="cutoff" step="0.01" placeholder="Enter cutoff value" />
        </div>

        <div class="summary-box">
          Overall Status:
          <span id="overallStatus" class="overall-neutral">--</span>
        </div>

        <div class="tti-grid">
          <div class="tti-item">
            <button type="button" class="tti-header-btn" onclick="togglePanel('hivPanel')">
              <span>HIV</span>
              <span id="hivBadge" class="test-badge neutral-badge">--</span>
            </button>
            <div id="hivPanel" class="tti-panel hidden">
              <div class="tti-row">
                <input type="number" step="0.01" id="hiv_od" placeholder="OD" oninput="compute('hiv')" />
                <input type="number" step="0.01" id="hiv_repeat1" placeholder="Repeat 1" />
                <input type="number" step="0.01" id="hiv_repeat2" placeholder="Repeat 2" />
              </div>
              <div id="hiv_result" class="result-box neutral">--</div>
            </div>
          </div>

          <div class="tti-item">
            <button type="button" class="tti-header-btn" onclick="togglePanel('hbsagPanel')">
              <span>HBsAg</span>
              <span id="hbsagBadge" class="test-badge neutral-badge">--</span>
            </button>
            <div id="hbsagPanel" class="tti-panel hidden">
              <div class="tti-row">
                <input type="number" step="0.01" id="hbsag_od" placeholder="OD" oninput="compute('hbsag')" />
                <input type="number" step="0.01" id="hbsag_repeat1" placeholder="Repeat 1" />
                <input type="number" step="0.01" id="hbsag_repeat2" placeholder="Repeat 2" />
              </div>
              <div id="hbsag_result" class="result-box neutral">--</div>
            </div>
          </div>

          <div class="tti-item">
            <button type="button" class="tti-header-btn" onclick="togglePanel('hcvPanel')">
              <span>HCV</span>
              <span id="hcvBadge" class="test-badge neutral-badge">--</span>
            </button>
            <div id="hcvPanel" class="tti-panel hidden">
              <div class="tti-row">
                <input type="number" step="0.01" id="hcv_od" placeholder="OD" oninput="compute('hcv')" />
                <input type="number" step="0.01" id="hcv_repeat1" placeholder="Repeat 1" />
                <input type="number" step="0.01" id="hcv_repeat2" placeholder="Repeat 2" />
              </div>
              <div id="hcv_result" class="result-box neutral">--</div>
            </div>
          </div>

          <div class="tti-item">
            <button type="button" class="tti-header-btn" onclick="togglePanel('syphilisPanel')">
              <span>Syphilis</span>
              <span id="syphilisBadge" class="test-badge neutral-badge">--</span>
            </button>
            <div id="syphilisPanel" class="tti-panel hidden">
              <div class="tti-row">
                <input type="number" step="0.01" id="syphilis_od" placeholder="OD" oninput="compute('syphilis')" />
                <input type="number" step="0.01" id="syphilis_repeat1" placeholder="Repeat 1" />
                <input type="number" step="0.01" id="syphilis_repeat2" placeholder="Repeat 2" />
              </div>
              <div id="syphilis_result" class="result-box neutral">--</div>
            </div>
          </div>

          <div class="tti-item">
            <button type="button" class="tti-header-btn" onclick="togglePanel('malariaPanel')">
              <span>Malaria</span>
              <span id="malariaBadge" class="test-badge neutral-badge">--</span>
            </button>
            <div id="malariaPanel" class="tti-panel hidden">
              <div class="tti-row">
                <input type="number" step="0.01" id="malaria_od" placeholder="OD" oninput="compute('malaria')" />
                <input type="number" step="0.01" id="malaria_repeat1" placeholder="Repeat 1" />
                <input type="number" step="0.01" id="malaria_repeat2" placeholder="Repeat 2" />
              </div>
              <div id="malaria_result" class="result-box neutral">--</div>
            </div>
          </div>
        </div>

        <div class="action-row">
          <button id="saveBtn" class="primary-btn" type="button">Save</button>
        </div>
        <p id="msg" class="message"></p>
      </section>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      addDoc,
      collection,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCuDknEG8pjbT0_yaEDZ77IFYdGYrtwCIE",
      authDomain: "red-cross-baguio-tti-monitor.firebaseapp.com",
      projectId: "red-cross-baguio-tti-monitor",
      storageBucket: "red-cross-baguio-tti-monitor.firebasestorage.app",
      messagingSenderId: "361015244463",
      appId: "1:361015244463:web:076f8802942ca904f5065a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentRole = "";
    let currentUser = null;

    const tests = ["hiv", "hbsag", "hcv", "syphilis", "malaria"];
    const sidebarEmail = document.getElementById("sidebarEmail");
    const sidebarRole = document.getElementById("sidebarRole");
    const logoutBtn = document.getElementById("logoutBtn");
    const saveBtn = document.getElementById("saveBtn");
    const msg = document.getElementById("msg");
    const cutoffInput = document.getElementById("cutoff");
    const overallStatus = document.getElementById("overallStatus");

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "index.html";
        return;
      }

      currentUser = user;
      sidebarEmail.textContent = user.email;

      const snap = await getDoc(doc(db, "users", user.uid));
      if (snap.exists()) {
        currentRole = snap.data().role || "";
        sidebarRole.textContent = currentRole || "-";
      } else {
        currentRole = "";
        sidebarRole.textContent = "no role";
      }
    });

    logoutBtn.onclick = async () => {
      await signOut(auth);
      window.location.href = "index.html";
    };

    function setResultUI(test, text, type) {
      const resultBox = document.getElementById(`${test}_result`);
      const badge = document.getElementById(`${test}Badge`);

      resultBox.textContent = text;
      resultBox.className = "result-box";
      badge.textContent = text;
      badge.className = "test-badge";

      if (type === "reactive") {
        resultBox.classList.add("reactive");
        badge.classList.add("reactive-badge");
      } else if (type === "nonreactive") {
        resultBox.classList.add("nonreactive");
        badge.classList.add("nonreactive-badge");
      } else {
        resultBox.classList.add("neutral");
        badge.classList.add("neutral-badge");
      }
    }

    function updateSummary() {
      let hasReactive = false;
      let hasValue = false;

      for (const test of tests) {
        const txt = document.getElementById(`${test}_result`).textContent;
        if (txt === "🔴 Reactive") {
          hasReactive = true;
          hasValue = true;
        } else if (txt === "🟢 Non-Reactive") {
          hasValue = true;
        }
      }

      if (!hasValue) {
        overallStatus.textContent = "--";
        overallStatus.className = "overall-neutral";
        return;
      }

      if (hasReactive) {
        overallStatus.textContent = "🔴 Reactive";
        overallStatus.className = "overall-reactive";
      } else {
        overallStatus.textContent = "🟢 Non-Reactive";
        overallStatus.className = "overall-nonreactive";
      }
    }

    window.compute = (test) => {
      const cutoff = parseFloat(cutoffInput.value);
      const odValue = parseFloat(document.getElementById(`${test}_od`).value);

      if (isNaN(odValue) || isNaN(cutoff)) {
        setResultUI(test, "--", "neutral");
        updateSummary();
        return;
      }

      if (odValue > cutoff) {
        setResultUI(test, "🔴 Reactive", "reactive");
      } else {
        setResultUI(test, "🟢 Non-Reactive", "nonreactive");
      }

      updateSummary();
    };

    cutoffInput.addEventListener("input", () => {
      for (const test of tests) {
        window.compute(test);
      }
    });

    window.togglePanel = (id) => {
      document.getElementById(id).classList.toggle("hidden");
    };

    function getTestData(test) {
      return {
        od: document.getElementById(`${test}_od`).value.trim(),
        repeat1: document.getElementById(`${test}_repeat1`).value.trim(),
        repeat2: document.getElementById(`${test}_repeat2`).value.trim(),
        interpretation: document.getElementById(`${test}_result`).textContent
      };
    }

    saveBtn.onclick = async () => {
      msg.textContent = "";

      if (!currentUser) {
        msg.textContent = "Please login first.";
        return;
      }

      try {
        const record = {
          serialNumber: document.getElementById("serialNumber").value.trim(),
          cutoff: cutoffInput.value.trim(),
          screening: {
            hiv: getTestData("hiv"),
            hbsag: getTestData("hbsag"),
            hcv: getTestData("hcv"),
            syphilis: getTestData("syphilis"),
            malaria: getTestData("malaria"),
            overallStatus: overallStatus.textContent
          },
          createdBy: currentUser.email,
          createdByUid: currentUser.uid,
          role: currentRole,
          createdAt: serverTimestamp()
        };

        await addDoc(collection(db, "hubing_results"), record);
        msg.textContent = "Record saved successfully.";
      } catch (error) {
        msg.textContent = error.message;
      }
    };
  </script>
</body>
</html>
