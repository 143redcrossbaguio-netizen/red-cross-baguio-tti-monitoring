<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Data Input</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="top-header">
  <div class="top-header-inner centered-header">
    <img src="logo.png" class="header-logo">
    <div class="header-text">
      <h1>PHILIPPINE RED CROSS BAGUIO CITY CHAPTER</h1>
      <h2>TTI MONITORING</h2>
    </div>
  </div>
</header>

<div class="app-shell">

<!-- SIDEBAR -->
<aside class="sidebar">
  <a href="data-input.html" class="nav-link active">Data Input</a>
  <a href="tracking.html" class="nav-link">Tracking</a>
  <a href="statistics.html" class="nav-link">Statistics</a>
  <button onclick="logout()" class="logout-btn">Logout</button>
</aside>

<!-- MAIN -->
<main class="main-content">

<h3>DATA INPUT</h3>

<!-- PATIENT INFO -->
<div class="content-card">

<h4>Patient Information</h4>

<!-- NAME -->
<div class="grid-4">
  <input id="surname" placeholder="Surname">
  <input id="firstname" placeholder="First Name">
  <input id="middlename" placeholder="Middle Name">
  <input id="suffix" placeholder="Suffix">
</div>

<input id="serial" placeholder="Serial Number">

<div class="grid-2">
  <input id="bloodType" placeholder="Blood Type">
  <select id="civil">
    <option>Civil Status</option>
    <option>Single</option>
    <option>Married</option>
    <option>Separated</option>
    <option>Widow</option>
    <option>Divorced</option>
  </select>
</div>

<div class="grid-2">
  <input type="date" id="birthday">
  <input id="age" placeholder="Age" readonly>
</div>

<input id="sex" placeholder="Sex">
<input id="contact" placeholder="Contact Info">
<input id="address" placeholder="Address">
<input id="occupation" placeholder="Occupation">

<input type="date" id="collectionDate">

<!-- DONOR TYPE -->
<label>Type of Donor:</label>
<div class="inline">
  <label><input type="checkbox"> Patient Directed</label>
  <label><input type="checkbox"> Walk-in</label>
  <label><input type="checkbox"> MBD</label>
</div>

<!-- FREQUENCY -->
<label>Frequency:</label>
<div class="inline">
  <label><input type="checkbox" id="newDonor"> New</label>
  <label><input type="checkbox" id="repeatDonor"> Repeat</label>
</div>

<input type="date" id="repeatDate" class="hidden" placeholder="Last Donation">

</div>

<!-- TTI RESULTS -->
<div class="content-card">

<h4>TTI Screening Results</h4>

<!-- TEST -->
<div>
  <label><input type="checkbox" onclick="toggleTest('hivBox')"> HIV</label>
  <div id="hivBox" class="hidden">
    <input placeholder="OD">
    <input placeholder="Repeat 1">
    <input placeholder="Repeat 2">
  </div>
</div>

<div>
  <label><input type="checkbox" onclick="toggleTest('hbsagBox')"> HBsAg</label>
  <div id="hbsagBox" class="hidden">
    <input placeholder="OD">
    <input placeholder="Repeat 1">
    <input placeholder="Repeat 2">
  </div>
</div>

<!-- COMMON FIELDS -->
<input placeholder="Lot Number">
<input type="date" placeholder="Expiration Date">
<input type="date" placeholder="Date Tested">

</div>

<button onclick="save()">SAVE</button>
<p id="msg"></p>

</main>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCuDknEG8pjbT0_yaEDZ77IFYdGYrtwCIE",
  projectId:"red-cross-baguio-tti-monitor"
});

const db = getFirestore(app);

// AUTO AGE
birthday.onchange = () => {
  const b = new Date(birthday.value);
  const today = new Date();
  let ageVal = today.getFullYear() - b.getFullYear();
  age.value = ageVal;
};

// REPEAT TOGGLE
repeatDonor.onchange = () => {
  repeatDate.classList.toggle("hidden", !repeatDonor.checked);
};

// TEST TOGGLE
window.toggleTest = (id) => {
  document.getElementById(id).classList.toggle("hidden");
};

// SAVE
window.save = async () => {
  await addDoc(collection(db,"tti_records"),{
    name: surname.value + " " + firstname.value,
    serial: serial.value
  });
  msg.textContent="Saved!";
};

// LOGOUT
window.logout = () => location.href="index.html";
</script>

</body>
</html>
