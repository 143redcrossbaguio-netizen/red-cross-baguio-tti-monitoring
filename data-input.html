<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, doc, getDoc, addDoc, collection
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCuDknEG8pjbT0_yaEDZ77IFYdGYrtwCIE",
  authDomain: "red-cross-baguio-tti-monitor.firebaseapp.com",
  projectId: "red-cross-baguio-tti-monitor"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentRole = "";

// CHECK LOGIN + ROLE
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    alert("Please login first");
    window.location.href = "index.html";
    return;
  }

  const snap = await getDoc(doc(db, "users", user.uid));
  if (snap.exists()) {
    currentRole = snap.data().role;
  }
});

// SAVE (BOTH CAN SAVE)
saveBtn.onclick = async () => {
  await addDoc(collection(db, "tti_records"), {
    donorName: donorName.value,
    donorId: donorId.value,
    date: date.value,
    hiv: hiv.value
  });

  msg.textContent = "Saved!";
};

window.back = () => window.location.href = "index.html";
</script>
