<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RED CROSS BAGUIO TTI MONITORING</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>RED CROSS BAGUIO TTI MONITORING</h1>
  </header>

  <main class="container">
    <!-- LOGIN -->
    <section id="loginSection" class="card">
      <h2>Login</h2>
      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />
      <button id="loginBtn">Login</button>
      <p id="loginMsg"></p>
    </section>

    <!-- DASHBOARD -->
    <section id="dashboardSection" class="card hidden">
      <h2>Dashboard</h2>
      <p><strong>Email:</strong> <span id="userEmail"></span></p>
      <p><strong>Role:</strong> <span id="userRole"></span></p>

      <div id="masterPanel" class="panel hidden">
        <h3>Master Access</h3>
        <p>You have full access to the system.</p>
      </div>

      <div id="memberPanel" class="panel hidden">
        <h3>Member Access</h3>
        <p>You have limited access to the system.</p>
      </div>

      <!-- DATA INPUT -->
      <div class="form-box">
        <h3>DATA INPUT</h3>

        <input type="text" id="donorName" placeholder="Donor Name" />
        <input type="text" id="donorId" placeholder="Donor ID" />
        <input type="date" id="date" />

        <select id="hiv">
          <option value="">HIV Result</option>
          <option value="Non-Reactive">Non-Reactive</option>
          <option value="Reactive">Reactive</option>
        </select>

        <select id="hbsag">
          <option value="">HBsAg Result</option>
          <option value="Non-Reactive">Non-Reactive</option>
          <option value="Reactive">Reactive</option>
        </select>

        <select id="hcv">
          <option value="">HCV Result</option>
          <option value="Non-Reactive">Non-Reactive</option>
          <option value="Reactive">Reactive</option>
        </select>

        <select id="syphilis">
          <option value="">Syphilis Result</option>
          <option value="Non-Reactive">Non-Reactive</option>
          <option value="Reactive">Reactive</option>
        </select>

        <select id="malaria">
          <option value="">Malaria Result</option>
          <option value="Non-Reactive">Non-Reactive</option>
          <option value="Reactive">Reactive</option>
        </select>

        <textarea id="remarks" placeholder="Remarks"></textarea>

        <button id="saveBtn">Save Record</button>
        <p id="saveMsg"></p>
      </div>

      <button id="logoutBtn" class="logout">Logout</button>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
