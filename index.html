<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RED CROSS BAGUIO TTI MONITORING</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>RED CROSS BAGUIO TTI MONITORING</h1>
  </header>

  <main class="container">
    <section id="loginSection" class="card">
      <h2>Login</h2>
      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />
      <button type="button" id="loginBtn">Login</button>
      <p id="loginMsg"></p>
    </section>

    <section id="dashboardSection" class="card hidden">
      <h2>Dashboard</h2>
      <p><strong>Email:</strong> <span id="userEmail"></span></p>
      <p><strong>Status:</strong> Logged in</p>
      <button type="button" id="logoutBtn">Logout</button>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCuDknEG8pjbT0_yaEDZ77IFYdGYrtwCIE",
      authDomain: "red-cross-baguio-tti-monitor.firebaseapp.com",
      projectId: "red-cross-baguio-tti-monitor",
      storageBucket: "red-cross-baguio-tti-monitor.firebasestorage.app",
      messagingSenderId: "361015244463",
      appId: "1:361015244463:web:076f8802942ca904f5065a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const loginMsg = document.getElementById("loginMsg");

    const loginSection = document.getElementById("loginSection");
    const dashboardSection = document.getElementById("dashboardSection");
    const userEmail = document.getElementById("userEmail");

    console.log("Firebase loaded");

    loginBtn.addEventListener("click", async () => {
      loginMsg.textContent = "Trying to log in...";

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        loginMsg.textContent = "Enter email and password.";
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);
        loginMsg.textContent = "Login successful.";
      } catch (error) {
        console.error(error);
        loginMsg.textContent = error.code + ": " + error.message;
      }
    });

    logoutBtn.addEventListener("click", async () => {
      try {
        await signOut(auth);
      } catch (error) {
        console.error(error);
      }
    });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        loginSection.classList.add("hidden");
        dashboardSection.classList.remove("hidden");
        userEmail.textContent = user.email;
      } else {
        loginSection.classList.remove("hidden");
        dashboardSection.classList.add("hidden");
        userEmail.textContent = "";
      }
    });
  </script>
</body>
</html>
