<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TTI Monitoring</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="main-header">
  <div class="header-content">
    <img src="logo.png" class="logo">

    <div class="title-group">
      <h1>PHILIPPINE RED CROSS BAGUIO CITY CHAPTER</h1>
      <h2>TTI MONITORING</h2>
    </div>
  </div>
</header>

<!-- LOGIN -->
<div class="container" id="loginSection">
  <div class="card">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <p id="loginMsg"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div class="container hidden" id="dashboardSection">
  <div class="card center">

    <h2>DASHBOARD</h2>

    <button onclick="goPage('data-input.html')">DATA INPUT</button>
    <button onclick="goPage('tracking.html')">TRACKING</button>
    <button onclick="goPage('statistics.html')">STATISTICS</button>

    <button class="logout" id="logoutBtn">Logout</button>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCuDknEG8pjbT0_yaEDZ77IFYdGYrtwCIE",
  authDomain: "red-cross-baguio-tti-monitor.firebaseapp.com",
  projectId: "red-cross-baguio-tti-monitor",
  storageBucket: "red-cross-baguio-tti-monitor.firebasestorage.app",
  messagingSenderId: "361015244463",
  appId: "1:361015244463:web:076f8802942ca904f5065a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

loginBtn.onclick = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
  } catch (e) {
    loginMsg.textContent = e.message;
  }
};

logoutBtn.onclick = async () => {
  await signOut(auth);
};

onAuthStateChanged(auth, user => {
  if (user) {
    loginSection.classList.add("hidden");
    dashboardSection.classList.remove("hidden");
  } else {
    loginSection.classList.remove("hidden");
    dashboardSection.classList.add("hidden");
  }
});

window.goPage = (page) => {
  window.location.href = page;
};
</script>

</body>
</html>
