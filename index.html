<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TTI Monitoring - Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-body">

  <header class="top-header">
    <div class="top-header-inner centered-header">
      <img src="logo.png" alt="PRC Logo" class="header-logo" />
      <div class="header-text">
        <h1>PHILIPPINE RED CROSS BAGUIO CITY CHAPTER</h1>
        <h2>TTI MONITORING</h2>
      </div>
    </div>
  </header>

  <main class="login-wrapper">
    <section id="loginSection" class="login-card">
      <div class="login-icon">🩺</div>
      <h3>System Login</h3>
      <p class="login-subtext">Authorized personnel only</p>

      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />
      <button id="loginBtn">Login</button>
      <p id="loginMsg" class="message"></p>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCuDknEG8pjbT0_yaEDZ77IFYdGYrtwCIE",
      authDomain: "red-cross-baguio-tti-monitor.firebaseapp.com",
      projectId: "red-cross-baguio-tti-monitor",
      storageBucket: "red-cross-baguio-tti-monitor.firebasestorage.app",
      messagingSenderId: "361015244463",
      appId: "1:361015244463:web:076f8802942ca904f5065a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const loginMsg = document.getElementById("loginMsg");

    loginBtn.onclick = async () => {
      loginMsg.textContent = "";

      if (!email.value.trim() || !password.value.trim()) {
        loginMsg.textContent = "Please enter email and password.";
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email.value.trim(), password.value);
        loginMsg.textContent = "Login successful.";
        window.location.href = "data-input.html";
      } catch (error) {
        loginMsg.textContent = error.message;
      }
    };

    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = "data-input.html";
      }
    });
  </script>
</body>
</html>
