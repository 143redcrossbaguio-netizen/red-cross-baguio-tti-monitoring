<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RED CROSS BAGUIO TTI MONITORING</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>RED CROSS BAGUIO TTI MONITORING</h1>
  </header>

  <main class="container">
    <section id="loginSection" class="card">
      <h2>Login</h2>
      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />
      <button id="loginBtn">Login</button>
      <p id="loginMsg"></p>
    </section>

    <section id="dashboardSection" class="card hidden">
      <h2>Dashboard</h2>
      <p><strong>Email:</strong> <span id="userEmail"></span></p>
      <p><strong>Status:</strong> <span id="userRole"></span></p>

      <div id="masterPanel" class="hidden"></div>
      <div id="memberPanel" class="hidden"></div>

      <button id="logoutBtn">Logout</button>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
