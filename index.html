<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TTI Monitoring</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- HEADER -->
<header class="main-header">
  <div class="header-content">
    <img src="logo.png" alt="PRC Logo" class="logo">

    <div class="title-group">
      <h1>PHILIPPINE RED CROSS BAGUIO CITY CHAPTER</h1>
      <h2>TTI MONITORING</h2>
    </div>

    <div class="user-info" id="headerUser"></div>
  </div>
</header>

<main class="container">

  <!-- LOGIN -->
  <section id="loginSection" class="card">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button id="loginBtn">Login</button>
    <p id="loginMsg"></p>
  </section>

  <!-- DASHBOARD -->
  <section id="dashboardSection" class="card hidden">

    <div class="top-bar">
      <span><strong>Email:</strong> <span id="userEmail"></span></span>
      <span><strong>Role:</strong> <span id="userRole"></span></span>
    </div>

    <div id="masterPanel" class="panel hidden">
      <h3>MASTER ACCESS</h3>
    </div>

    <div id="memberPanel" class="panel hidden">
      <h3>MEMBER ACCESS</h3>
    </div>

    <!-- DATA INPUT -->
    <div class="form-box">
      <h3>DATA INPUT</h3>

      <input type="text" id="donorName" placeholder="Donor Name" />
      <input type="text" id="donorId" placeholder="Donor ID" />
      <input type="date" id="date" />

      <select id="hiv">
        <option value="">HIV</option>
        <option value="Non-Reactive">Non-Reactive</option>
        <option value="Reactive">Reactive</option>
      </select>

      <select id="hbsag">
        <option value="">HBsAg</option>
        <option value="Non-Reactive">Non-Reactive</option>
        <option value="Reactive">Reactive</option>
      </select>

      <select id="hcv">
        <option value="">HCV</option>
        <option value="Non-Reactive">Non-Reactive</option>
        <option value="Reactive">Reactive</option>
      </select>

      <select id="syphilis">
        <option value="">Syphilis</option>
        <option value="Non-Reactive">Non-Reactive</option>
        <option value="Reactive">Reactive</option>
      </select>

      <select id="malaria">
        <option value="">Malaria</option>
        <option value="Non-Reactive">Non-Reactive</option>
        <option value="Reactive">Reactive</option>
      </select>

      <textarea id="remarks" placeholder="Remarks"></textarea>

      <button id="saveBtn">Save Record</button>
      <p id="saveMsg"></p>
    </div>

    <!-- TABLE -->
    <div class="table-box">
      <h3>TTI RECORDS</h3>

      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Donor</th>
            <th>ID</th>
            <th>HIV</th>
            <th>HBsAg</th>
            <th>HCV</th>
            <th>Syphilis</th>
            <th>Malaria</th>
            <th>Remarks</th>
            <th>By</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="recordsBody"></tbody>
      </table>
    </div>

    <button id="logoutBtn" class="logout">Logout</button>

  </section>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, doc, getDoc, collection, addDoc,
  serverTimestamp, onSnapshot, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCuDknEG8pjbT0_yaEDZ77IFYdGYrtwCIE",
  authDomain: "red-cross-baguio-tti-monitor.firebaseapp.com",
  projectId: "red-cross-baguio-tti-monitor",
  storageBucket: "red-cross-baguio-tti-monitor.firebasestorage.app",
  messagingSenderId: "361015244463",
  appId: "1:361015244463:web:076f8802942ca904f5065a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentRole = "";
let unsubscribe = null;

loginBtn.onclick = async () => {
  try {
    await signInWithEmailAndPassword(auth, email.value, password.value);
  } catch (e) {
    loginMsg.textContent = e.message;
  }
};

logoutBtn.onclick = async () => {
  if (unsubscribe) unsubscribe();
  await signOut(auth);
};

onAuthStateChanged(auth, async (user) => {
  if (unsubscribe) unsubscribe();

  if (user) {
    loginSection.classList.add("hidden");
    dashboardSection.classList.remove("hidden");

    userEmail.textContent = user.email;
    headerUser.textContent = user.email;

    const snap = await getDoc(doc(db, "users", user.uid));

    if (snap.exists()) {
      currentRole = snap.data().role;
      userRole.textContent = currentRole;

      masterPanel.classList.toggle("hidden", currentRole !== "master");
      memberPanel.classList.toggle("hidden", currentRole !== "member");
    }

    unsubscribe = onSnapshot(collection(db, "tti_records"), (snapshot) => {
      recordsBody.innerHTML = "";

      snapshot.forEach((docSnap) => {
        const d = docSnap.data();

        const row = `
        <tr>
          <td>${d.date || ""}</td>
          <td>${d.donorName || ""}</td>
          <td>${d.donorId || ""}</td>
          <td>${d.hiv || ""}</td>
          <td>${d.hbsag || ""}</td>
          <td>${d.hcv || ""}</td>
          <td>${d.syphilis || ""}</td>
          <td>${d.malaria || ""}</td>
          <td>${d.remarks || ""}</td>
          <td>${d.createdBy || ""}</td>
          <td>
            ${currentRole === "master"
              ? `<button class="deleteBtn" data-id="${docSnap.id}">Delete</button>`
              : ""}
          </td>
        </tr>`;

        recordsBody.innerHTML += row;
      });
    });
  } else {
    loginSection.classList.remove("hidden");
    dashboardSection.classList.add("hidden");
  }
});

saveBtn.onclick = async () => {
  await addDoc(collection(db, "tti_records"), {
    donorName: donorName.value,
    donorId: donorId.value,
    date: date.value,
    hiv: hiv.value,
    hbsag: hbsag.value,
    hcv: hcv.value,
    syphilis: syphilis.value,
    malaria: malaria.value,
    remarks: remarks.value,
    createdBy: auth.currentUser.email,
    createdAt: serverTimestamp()
  });

  saveMsg.textContent = "Saved!";
};

document.addEventListener("click", async (e) => {
  if (e.target.classList.contains("deleteBtn")) {
    await deleteDoc(doc(db, "tti_records", e.target.dataset.id));
  }
});
</script>

</body>
</html>
